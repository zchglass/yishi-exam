// ======= 状态 =======
let history = [];
let isDrawing = false;

const cardsEl = document.getElementById('cards');
const drawBtn = document.getElementById('drawBtn');
const drawCountEl = document.getElementById('drawCount');
const historyEl = document.getElementById('history');
const historyToggle = document.getElementById('historyToggle');

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickFour() {
  const copy = [...QUESTIONS];
  shuffle(copy);
  return copy.slice(0, 4);
}

function renderCards(four) {
  cardsEl.innerHTML = four.map((q, i) => `
    <div class="card">
      <div class="num">第 ${q.id} 题</div>
      <div class="category">${q.category}</div>
      <div class="title">${q.title}</div>
    </div>
  `).join('');
}

function draw() {
  if (isDrawing) return;
  isDrawing = true;
  drawBtn.disabled = true;

  // 短暂动画延迟
  setTimeout(() => {
    const four = pickFour();
    renderCards(four);
    history.push({ time: new Date(), items: four });
    drawCountEl.textContent = history.length;
    isDrawing = false;
    drawBtn.disabled = false;
  }, 150);
}

function renderHistory() {
  if (history.length === 0) {
    historyEl.innerHTML = '<div style="color:#8a9aa8;text-align:center;padding:12px;">暂无记录</div>';
    return;
  }
  // 倒序显示（最新的在上面）
  const reversed = [...history].reverse();
  historyEl.innerHTML = reversed.map((h, i) => {
    const timeStr = h.time.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const items = h.items.map(q => `【${q.category}】${q.title}`).join('<br>');
    return `<div class="h-item"><span class="h-time">${timeStr}</span>#${history.length - i}<br>${items}</div>`;
  }).join('');
}

drawBtn.addEventListener('click', draw);

historyToggle.addEventListener('click', () => {
  const show = historyEl.classList.toggle('show');
  historyToggle.textContent = show ? '🙈 收起记录' : '📜 查看抽题记录';
  if (show) renderHistory();
});

// 首次进入自动抽一题
draw();
